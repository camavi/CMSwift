<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMSwift UI Demo</title>
    <link rel="stylesheet" href="/_cmswift-fe/css/responsive.css" />
    <link rel="stylesheet" href="/_cmswift-fe/css/ui.css" />
    <link rel="stylesheet" href="/_cmswift-fe/css/animation.css" />
    <link rel="stylesheet" href="/_cmswift-fe/css/tabler-icons-out.css" />
    <script src="/config-fe/setting.js"></script>
    <script src="/_cmswift-fe/js/cms.js"></script>
    <script src="/_cmswift-fe/js/ui.js"></script>
    <style>
      body {
        margin: 0;
        background: var(--cms-bg);
        color: var(--cms-text);
        font-family: var(--cms-font);
      }

      a {
        color: inherit;
      }
      .demo-section {
        margin-top: var(--cms-s-xs);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
  </body>
  <script>
    //UI.Btn({ onClick: () => CMSwift.router.navigate("/users") }, "Vai a Users")
    //CMSwift.router.add("/users", () => UsersPage());

    // Router mount
    CMSwift.router.setOutlet("#app");
    //CMSwift.router.setMode("auto");
    CMSwift.router.add("/", () => Home());
    CMSwift.router.add("/login", () => Login());
    CMSwift.router.add("/dashboard", () => Dashboard());
    CMSwift.router.start();
    CMSwift.ready(() => {
      // --- Playground state ---
      const rLabel = _.rod("Stato");
      const rClearable = _.rod(true);
      const rFilterable = _.rod(false);
      const rDisabled = _.rod(false);
      const rValue = _.rod("published");

      // --- Demo component builder ---
      const DemoPreview = () =>
        _.Card(
          { class: "demo-box" },
          _.Select({
            label: rLabel,
            clearable: rClearable,
            filterable: rFilterable,
            disabled: rDisabled,
            model: rValue,
            options: [
              { label: "Draft", value: "draft" },
              { label: "Published", value: "published" },
              { label: "Archived", value: "archived", disabled: true },
            ],
          }),
          _.div(
            { class: "cms-muted", style: { marginTop: "8px" } },
            () => `Selezionato: ${rValue}`,
          ),
        );

      // --- Controls (Playground) ---
      const Controls = _.Card(
        { class: "demo-controls" },
        _.Input({
          label: "Label",
          model: rLabel,
          clearable: rClearable,
        }),
        _.Toolbar(
          { dense: true, justify: "space-between" },
          _.Btn({
            label: () =>
              rClearable.value ? "Clearable: ON" : "Clearable: OFF",
            onClick: () => (rClearable.value = !rClearable.value),
          }),
          _.Btn({
            label: () => (rFilterable.value ? "Filter: ON" : "Filter: OFF"),
            onClick: () => (rFilterable.value = !rFilterable.value),
          }),
          _.Btn({
            label: () => (rDisabled.value ? "Disabled: ON" : "Disabled: OFF"),
            onClick: () => (rDisabled.value = !rDisabled.value),
          }),
        ),
      );

      // --- Page Layout ---
      CMSwift.mount(
        "#app",
        _.Container(
          // HERO
          _.Card(
            { class: "demo-hero" },
            _.h1("_.Select"),
            _.p(
              { class: "cms-muted" },
              "Select premium: clearable, filterable, keyboard nav, async options, groups.",
            ),
            _.Toolbar(
              { dense: true, gap: "10px" },
              _.Badge?.({ color: "success" }, "Stable") || _.span("Stable"),
              _.Badge?.({ color: "info" }, "Reactive") || _.span("Reactive"),
              _.Badge?.({ color: "dark" }, "No build") || _.span("No build"),
            ),
            _.pre(
              { class: "demo-code" },
              `const val = _.rod("published");
        UI.Select({ label:"Stato", model: val, clearable:true, filterable:true, options:[...] });`,
            ),
          ),

          // PLAYGROUND
          _.Card(
            { class: "demo-section" },
            _.h2("Playground"),
            _.Row(
              _.Col({ style: { flex: "1" } }, DemoPreview()),
              _.Col({ style: { width: "340px" } }, Controls),
            ),
          ),

          // FEATURES
          _.Card(
            { class: "demo-section" },
            _.h2("Features"),
            _.ul(
              _.li("Clearable + placeholder"),
              _.li("Filterable (useInput)"),
              _.li("Groups + Async options"),
              _.li("Keyboard navigation (↑ ↓ Enter Esc)"),
            ),
          ),

          // API (auto)
          _.Card(
            { class: "demo-section" },
            _.h2("API"),
            _.docTable
              ? _.docTable("Select")
              : _.div("_.docTable non disponibile"),
          ),

          // EXAMPLES
          _.Card(
            { class: "demo-section" },
            _.h2("Examples"),
            _.h3("Basic"),
            _.Card(DemoPreview()),

            _.h3("Disabled + Error"),
            _.Select({
              label: "Tags",
              multiple: true,
              filterable: true,
              allowCustom: true,
              clearable: true,
              options: [
                "Design",
                "Frontend",
                "Backend",
                { label: "Platform", options: ["API", "Infra", "DevOps"] },
              ],
            }),
            _.Select({
              label: "Categoria",
              disabled: true,
              error: "Campo bloccato",
              options: ["A", "B", "C"],
            }),
            CMSwift.ui.Select({
              label: "Tags",
              clearable: rClearable,
              filterable: true,
              options: ["Alpha", "Beta", "Gamma"],
              slots: {
                filter: ({ value, setValue, close }) =>
                  _.input({
                    class: "cms-input",
                    placeholder: "Type to filter…",
                    value,
                    onInput: (e) => setValue(e.target.value),
                    onKeydown: (e) => {
                      if (e.key === "Escape") close();
                    },
                  }),
              },
            }),
            CMSwift.ui.Input({
              label: "Search",
              clearable: true,
              slots: {
                clear: ({ clear, disabled, readonly, hasValue }) =>
                  CMSwift.ui.Btn(
                    {
                      disabled: disabled || readonly || !hasValue,
                      onClick: clear,
                    },
                    "Reset",
                  ),
              },
            }),
            CMSwift.ui.Select({
              label: "Team",
              allowCustom: true,
              options: [
                { label: "Alice", value: 1 },
                { label: "Bob", value: 2 },
              ],
              slots: {
                option: ({ opt, selected }) =>
                  _.div(
                    { class: selected ? "is-selected" : "" },
                    _.strong(opt.label),
                    _.span(
                      { class: "cms-muted", style: { marginLeft: "6px" } },
                      `#${opt.value}`,
                    ),
                  ),
              },
            }),
          ),
        ),
      );
    });
    CMSwift.ready(() => {
      const form = CMSwift.useForm({
        model: _.rod({ email: "", role: "user" }),
        validateOn: "blur",
        rules: {
          email: [
            (v) => (!!v && String(v).includes("@")) || "Email non valida",
          ],
          role: [(v) => !!v || "Seleziona un ruolo"],
        },
      });

      const fEmail = form.field("email", { hint: "Inserisci un'email valida" });
      const fRole = form.field("role");
      const modelTest = _.rod(null);
      CMSwift.mount(
        "#app",
        _.Card(
          _.h2("Signup"),
          _.Form(
            { form, onSubmit: async (model) => console.log("SUBMIT", model) },
            () => [
              _.Input({
                label: "Email",
                model: fEmail.model,
                error: () => fEmail.error(),
                hint: fEmail.hint,
                onInput: fEmail.onInput,
                onBlur: fEmail.onBlur,
                clearable: true,
              }),
              _.Select({
                label: "Ruolo",
                model: fRole.model,
                error: fRole.error,
                options: ["user", "admin", "editor"],
                clearable: true,
              }),
              _.Toolbar(
                { justify: "space-between" },
                _.Btn({ onClick: () => form.reset() }, "Reset"),
                _.Btn(
                  {
                    color: "primary",
                    type: "submit",
                    loading: form.submitting.value,
                  },
                  "Invia",
                ),
              ),
              _.div({ class: "cms-error" }, () => form.submitError.value || ""),
            ],
          ),
          _.Card(
            _.h4("Model"),
            _.div(
              _.Btn(
                {
                  onClick: () => {
                    fEmail.model.value = "ccamavi@gmail.com";
                    console.log(fEmail.error());
                  },
                },
                "Test",
              ),
            ),
          ),
        ),
      );
      // Dialog confirm
      const dlg = _.Dialog({
        title: "Delete file?",
        content: ({ close }) => _.p("This action cannot be undone."),
        actions: ({ close }) => [
          _.Btn({ onClick: close }, "Cancel"),
          _.Btn(
            {
              variant: "primary",
              onClick: () => {
                /* confirm */ close();
              },
            },
            "Delete",
          ),
        ],
      });
      dlg.open();
    });
  </script>
</html>
